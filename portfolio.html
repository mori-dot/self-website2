<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>案例展示 - 个人官网</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            color: #333;
            line-height: 1.6;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        /* 导航栏 */
        nav {
            background-color: #f8f9fa;
            padding: 20px 0;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .nav-links {
            display: flex;
            gap: 30px;
        }
        
        .nav-links a {
            text-decoration: none;
            color: #333;
            font-weight: 500;
        }
        
        /* 页面内容 */
        .page-content {
            padding: 60px 0;
        }
        
        .page-title {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 40px;
            color: #333;
        }
        
        /* 案例展示区域 */
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }
        
        .portfolio-item {
            background-color: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            position: relative;
        }
        
        .upload-area {
            border: 2px dashed #ccc;
            border-radius: 10px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .upload-area:hover {
            border-color: #333;
            background-color: #f0f0f0;
        }
        
        .upload-input {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }
        
        .upload-label {
            display: block;
            cursor: pointer;
        }
        
        .upload-button {
            display: inline-block;
            padding: 10px 20px;
            background-color: #f0f0f0;
            border: 1px solid #ccc;
            border-radius: 5px;
            margin-top: 20px;
            cursor: pointer;
        }
        
        .portfolio-image {
            max-width: 100%;
            max-height: 250px;
            object-fit: cover;
            border-radius: 5px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        
        .portfolio-image:hover {
            transform: scale(1.02);
        }
        
        /* 模态框样式 */
        .modal {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
            overflow: auto;
        }
        
        .modal-content {
            display: block;
            margin: 10% auto;
            max-width: 90%;
            max-height: 80%;
        }
        
        .close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: #f1f1f1;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .close:hover {
            color: #bbb;
        }
        
        .image-actions {
            margin-top: 10px;
        }
        
        .action-button {
            padding: 5px 10px;
            background-color: #f0f0f0;
            border: 1px solid #ccc;
            border-radius: 3px;
            margin: 0 5px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        
        /* 底部版权 */
        footer {
            background-color: #f8f9fa;
            padding: 30px 0;
            text-align: center;
            border-top: 1px solid #e0e0e0;
            margin-top: 60px;
        }
        
        .copyright {
            color: #666;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .page-title {
                font-size: 2rem;
            }
            
            .nav-links {
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav>
        <div class="container nav-container">
            <div class="logo">
                <!-- 此处填写 logo -->
            </div>
            <div class="nav-links">
                <a href="index.html">首页</a>
                <a href="about.html">关于我</a>
                <a href="services.html">核心服务</a>
                <a href="portfolio.html">案例展示</a>
                <a href="contact.html">联系方式</a>
            </div>
        </div>
    </nav>
    
    <!-- 页面内容 -->
    <section class="page-content">
        <div class="container">
            <h1 class="page-title">案例展示</h1>
            
            <!-- 案例展示网格 -->
            <div class="portfolio-grid">
                <!-- 案例1 -->
                <div class="portfolio-item">
                    <div class="upload-area">
                        <p>点击或拖拽上传Listing截图</p>
                        <input type="file" class="upload-input" data-index="0">
                        <label for="" class="upload-label">
                            <span class="upload-button">选择文件</span>
                        </label>
                    </div>
                </div>
                
                <!-- 案例2 -->
                <div class="portfolio-item">
                    <div class="upload-area">
                        <p>点击或拖拽上传Listing截图</p>
                        <input type="file" class="upload-input" data-index="1">
                        <label for="" class="upload-label">
                            <span class="upload-button">选择文件</span>
                        </label>
                    </div>
                </div>
                
                <!-- 案例3 -->
                <div class="portfolio-item">
                    <div class="upload-area">
                        <p>点击或拖拽上传Listing截图</p>
                        <input type="file" class="upload-input" data-index="2">
                        <label for="" class="upload-label">
                            <span class="upload-button">选择文件</span>
                        </label>
                    </div>
                </div>
                
                <!-- 案例4 -->
                <div class="portfolio-item">
                    <div class="upload-area">
                        <p>点击或拖拽上传Listing截图</p>
                        <input type="file" class="upload-input" data-index="3">
                        <label for="" class="upload-label">
                            <span class="upload-button">选择文件</span>
                        </label>
                    </div>
                </div>
            </div>
        </div>
    </section>
    
    <!-- 底部版权 -->
    <footer>
        <div class="container">
            <div class="copyright">©【2026】【周茂林】- 亚马逊运营个人官网 | 专注跨境，诚信服务</div>
        </div>
    </footer>
    
    <!-- 图片放大模态框 -->
    <div id="imageModal" class="modal">
        <span class="close">&times;</span>
        <img class="modal-content" id="modalImage">
    </div>
    
    <script>
        // 页面加载时从本地存储读取图片
        window.onload = function() {
            for (let i = 0; i < 4; i++) {
                const savedImage = localStorage.getItem(`listingImage_${i}`);
                if (savedImage) {
                    const portfolioItems = document.querySelectorAll('.portfolio-item');
                    if (portfolioItems[i]) {
                        const portfolioItem = portfolioItems[i];
                        portfolioItem.innerHTML = `
                            <img src="images/listing${i+1}.jpg" class="portfolio-image">
                            <p style="font-size: 0.9rem; color: #666; margin-bottom: 10px;">图片已设置为相对路径：images/listing${i+1}.jpg</p>
                            <div class="image-actions">
                                <button class="action-button" onclick="resizeImage(this)">调整尺寸</button>
                                <button class="action-button" onclick="replaceImage(this)">更换图片</button>
                            </div>
                            <input type="file" class="upload-input" data-index="${i}" style="display: none;">
                        `;
                        // 重新绑定事件
                        const input = portfolioItem.querySelector('.upload-input');
                        input.addEventListener('change', handleImageUpload);
                        // 添加图片点击事件
                        const image = portfolioItem.querySelector('.portfolio-image');
                        image.addEventListener('click', function() {
                            openModal(this.src);
                        });
                    }
                }
            }
            
            // 绑定模态框关闭事件
            document.querySelector('.close').addEventListener('click', closeModal);
            
            // 点击模态框外部关闭
            window.addEventListener('click', function(event) {
                const modal = document.getElementById('imageModal');
                if (event.target == modal) {
                    closeModal();
                }
            });
        };
        
        // 图片上传功能
        function handleImageUpload(e) {
            const input = e.target;
            const index = input.getAttribute('data-index');
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const imageData = event.target.result;
                    // 保存到本地存储
                    localStorage.setItem(`listingImage_${index}`, imageData);
                    
                    const portfolioItem = input.closest('.portfolio-item');
                    portfolioItem.innerHTML = `
                        <img src="images/listing${parseInt(index)+1}.jpg" class="portfolio-image">
                        <p style="font-size: 0.9rem; color: #666; margin-bottom: 10px;">图片已设置为相对路径：images/listing${parseInt(index)+1}.jpg</p>
                        <div class="image-actions">
                            <button class="action-button" onclick="resizeImage(this)">调整尺寸</button>
                            <button class="action-button" onclick="replaceImage(this)">更换图片</button>
                        </div>
                        <input type="file" class="upload-input" data-index="${index}" style="display: none;">
                    `;
                    // 重新绑定事件
                    const newInput = portfolioItem.querySelector('.upload-input');
                    newInput.addEventListener('change', handleImageUpload);
                    // 添加图片点击事件
                    const image = portfolioItem.querySelector('.portfolio-image');
                    image.addEventListener('click', function() {
                        openModal(this.src);
                    });
                };
                reader.readAsDataURL(file);
            }
        }
        
        // 打开图片模态框
        function openModal(imageSrc) {
            const modal = document.getElementById('imageModal');
            const modalImage = document.getElementById('modalImage');
            modal.style.display = 'block';
            modalImage.src = imageSrc;
        }
        
        // 关闭图片模态框
        function closeModal() {
            const modal = document.getElementById('imageModal');
            modal.style.display = 'none';
        }
        
        // 初始绑定事件
        document.querySelectorAll('.upload-input').forEach((input) => {
            input.addEventListener('change', handleImageUpload);
        });
        
        // 调整图片尺寸
        function resizeImage(button) {
            const image = button.closest('.portfolio-item').querySelector('.portfolio-image');
            const currentWidth = image.style.width || '100%';
            if (currentWidth === '100%') {
                image.style.width = '90%';
            } else if (currentWidth === '90%') {
                image.style.width = '80%';
            } else {
                image.style.width = '100%';
            }
        }
        
        // 更换图片
        function replaceImage(button) {
            const input = button.closest('.portfolio-item').querySelector('.upload-input');
            input.click();
        }
    </script>
</body>
</html>
